name: OpenRouter Review on Push

on:
  push:
    branches: [ main ]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Show recent changes
        run: |
          git log -1 --name-status
          git diff HEAD^ --stat

      - name: Call OpenRouter
        run: |
          # optional: собрать diff в файл
          git diff HEAD^ > /tmp/changes.txt

          curl -X POST https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer ${{ secrets.OPEN_ROUTER_KEY }}" \
            -H "Content-Type: application/json" \
            -H "HTTP-Referer: https://github.com/${{ github.repository }}" \
            -H "X-Title: ${{ github.workflow }}" \
            -d '{
              "model": "qwen/qwen3.6-plus-preview:free",
              "messages": [
                { "role": "system", "content": "Ты ревьюер кода. На русском языке." },
                { "role": "user", "content": "Проанализируй изменения:\n\n$(cat /tmp/changes.txt)\n" }
              ],
              "max_tokens": 512
            }' > /tmp/ai_response.json

      - name: Save AI comment
        run: |
          AI_COMMENT=$(jq -r '.choices[0].message.content' /tmp/ai_response.json)
          echo "# AI Review from OpenRouter" > review.md
          echo "$AI_COMMENT" >> review.md
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add review.md
          git commit -m "🤖 AI review (OpenRouter)"
          git push
